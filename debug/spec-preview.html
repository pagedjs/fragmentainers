<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Spec Preview</title>
	<style>
		body {
			font-family: monospace;
			font-size: 12px;
			margin: 1rem;
			background: #eee;
		}
		#controls {
			display: flex;
			gap: 8px;
			align-items: center;
			margin-bottom: 12px;
		}
		#controls input, #controls button {
			font-family: monospace;
			font-size: 12px;
			padding: 2px 6px;
		}
		#info {
			background: #f8f8f8;
			border: 1px solid #ccc;
			padding: 8px;
			margin-bottom: 12px;
			white-space: pre-wrap;
			display: none;
		}
		.compare {
			display: flex;
			gap: 24px;
			align-items: flex-start;
		}
		.column {
			flex: 1;
			min-width: 0;
		}
		.column h3 {
			margin: 0 0 8px;
			padding: 4px 8px;
			background: #333;
			color: #fff;
		}
		.pages {
			display: flex;
			flex-direction: column;
			gap: 8px;
			background: #fff;
			padding: 8px;
		}
		.page-label {
			font-size: 11px;
			color: #666;
			margin-bottom: 2px;
		}
		page-container {
			outline: 1px solid #ccc;
			display: block;
		}
		iframe {
			border: 1px solid #ccc;
			background: #fff;
		}
	</style>
</head>
<body>
	<div id="controls">
		<input id="url-input" type="text" placeholder="specs/at-page/text-align-last.html" style="flex:1;min-width:200px;" />
		<button id="render-btn">Render</button>
	</div>
	<div id="info"></div>
	<div class="compare">
		<div class="column">
			<h3 id="left-title">paginate() — spec processor path</h3>
			<div class="pages" id="paginate-output"></div>
		</div>
		<div class="column">
			<h3 id="right-title">ContentParser.fromString() — debug viewer path</h3>
			<div class="pages" id="debug-output"></div>
		</div>
	</div>

	<script type="module">
		import { FragmentedFlow, PageResolver } from "../src/index.js";
		import { ContentParser } from "./content-parser.js";
		import "../src/dom/fragment-container.js";
		import "./page-container.js";

		const params = new URLSearchParams(location.search);
		const urlInput = document.getElementById("url-input");
		const renderBtn = document.getElementById("render-btn");
		const infoEl = document.getElementById("info");
		const paginateOut = document.getElementById("paginate-output");
		const debugOut = document.getElementById("debug-output");

		urlInput.value = params.get("url") || "specs/at-page/text-align-last.html";

		renderBtn.addEventListener("click", () => {
			const p = new URLSearchParams();
			p.set("url", urlInput.value);
			location.search = p.toString();
		});
		urlInput.addEventListener("keydown", (e) => {
			if (e.key === "Enter") renderBtn.click();
		});

		const url = params.get("url");
		if (url) run(url);

		async function run(url) {
			const response = await fetch(url);
			const html = await response.text();
			const baseURL = url.substring(0, url.lastIndexOf("/") + 1);

			const lines = [];

			// === Left column: paginate() path ===
			// Simulates what specs/helpers/process.js does:
			// inject HTML into a live document, then paginate from the DOM.
			try {
				const t0 = performance.now();
				const paginateFrame = document.createElement("iframe");
				paginateFrame.style.cssText = "position:fixed;left:-99999px;width:1400px;height:900px;";
				document.body.appendChild(paginateFrame);

				// Write the test HTML into the iframe so the browser renders it natively
				paginateFrame.contentDocument.open();
				paginateFrame.contentDocument.write(html);
				paginateFrame.contentDocument.close();

				// Wait for fonts to load inside the iframe
				await paginateFrame.contentDocument.fonts.ready;

				const iframeDoc = paginateFrame.contentDocument;
				const iframeBody = iframeDoc.body;

				// Step 1: Read @page rules from the live document (like paginate.js)
				const resolver = PageResolver.fromStyleSheets(
					collectIframeStyles(iframeDoc)
				);

				// Step 2: Move body content into a fragment (like paginate.js)
				const frag = document.createDocumentFragment();
				while (iframeBody.firstChild) {
					frag.appendChild(document.adoptNode(iframeBody.firstChild));
				}

				// Step 3: Collect styles (like ContentParser.collectDocumentStyles but from iframe)
				const styles = collectIframeStyles(iframeDoc);

				const layout = new FragmentedFlow(frag, { resolver, styles });
				await layout.preload();
				const flow = layout.flow();
				const elapsed = performance.now() - t0;

				lines.push(`paginate() path: ${flow.length} pages (${elapsed.toFixed(1)}ms)`);
				document.getElementById("left-title").textContent =
					`paginate() path — ${flow.length} pages`;

				for (let i = 0; i < flow.length; i++) {
					const label = document.createElement("div");
					label.className = "page-label";
					label.textContent = `Page ${i + 1}`;
					paginateOut.appendChild(label);

					const page = document.createElement("page-container");
					page.appendChild(flow[i]);
					paginateOut.appendChild(page);
				}

				paginateFrame.remove();
			} catch (err) {
				lines.push(`paginate() path ERROR: ${err.message}`);
				console.error("paginate path error:", err);
			}

			// === Right column: ContentParser.fromString() path ===
			try {
				const t0 = performance.now();
				const parsed = await ContentParser.fromString(html, baseURL);
				const resolver = PageResolver.fromStyleSheets(parsed.styles);

				const layout = new FragmentedFlow(parsed.fragment, {
					styles: parsed.styles,
					resolver: resolver.pageRules.length > 0 ? resolver : undefined,
				});
				await layout.preload();
				const flow = layout.flow();
				const elapsed = performance.now() - t0;

				lines.push(`fromString() path: ${flow.length} pages (${elapsed.toFixed(1)}ms)`);
				document.getElementById("right-title").textContent =
					`fromString() path — ${flow.length} pages`;

				for (let i = 0; i < flow.length; i++) {
					const label = document.createElement("div");
					label.className = "page-label";
					label.textContent = `Page ${i + 1}`;
					debugOut.appendChild(label);

					const page = document.createElement("page-container");
					page.appendChild(flow[i]);
					debugOut.appendChild(page);
				}
			} catch (err) {
				lines.push(`fromString() path ERROR: ${err.message}`);
				console.error("fromString path error:", err);
			}

			infoEl.textContent = lines.join("\n");
			infoEl.style.display = "block";
		}

		/**
		 * Collect styles from an iframe document, re-creating them as
		 * constructed CSSStyleSheets (mirrors collectDocumentStyles).
		 */
		function collectIframeStyles(doc) {
			const sheets = [];
			for (const sheet of doc.styleSheets) {
				try {
					const constructed = new CSSStyleSheet();
					let css = "";
					for (const rule of sheet.cssRules) {
						css += rule.cssText + "\n";
					}
					constructed.replaceSync(css);
					sheets.push(constructed);
				} catch {
					// cross-origin
				}
			}
			return sheets;
		}
	</script>
</body>
</html>
