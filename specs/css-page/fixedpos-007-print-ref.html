<!DOCTYPE html>

<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 816px;
    height: 1056px;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
  }
  .body {
    margin: 0;
    flex-grow: 1;
  }
</style>
<section class="page">
  <section class="body">
    <div style="margin-top:4em;">
      There should be three pages.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:0;">
      This should be repeated on every page.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:100%;">
      This should be repeated on every page.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:200%;">
      This should be repeated on every page.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:0; margin-top:2em;">
      This should also be repeated on every page.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:100%; margin-top:2em;">
      This should also be repeated on every page.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="position:absolute; top:200%; margin-top:2em;">
      This should also be repeated on every page.
    </div>
  </section>
</section>
