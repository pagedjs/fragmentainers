<!DOCTYPE html>
<link rel="author" title="Morten Stenshorne" href="mailto:mstensho@chromium.org">
<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 400px;
    height: 400px;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
  }
  .page.large {
    width: 500px;
    height: 400px;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
  }
  :root {
    print-color-adjust: exact;
  }
  .body {
    margin: 0;
    flex-grow: 1;
  }
</style>
<section class="page">
  <section class="body">
    This page should <em>not</em> have a blue box.
  </section>
</section>
<section class="page large">
  <section class="body">
    <div>
      <div style="float:right; margin-top:300px; width:100px; height:100px; background:blue;"></div>
      <div style="width:400px;">
        This page should have a blue box in the bottom right corner.
      </div>
      <div style="break-before:page;">
        <div style="float:right; margin-top:300px; width:100px; height:100px; background:blue;"></div>
        <div style="width:400px;">
          This page should have a blue box in the bottom right corner.
        </div>
      </div>
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    This page should <em>not</em> have a blue box.
  </section>
</section>
