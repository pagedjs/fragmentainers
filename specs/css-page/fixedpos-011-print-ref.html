<!DOCTYPE html>
<link rel="author" title="Morten Stenshorne" href="mailto:mstensho@chromium.org">
<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 816px;
    height: 1056px;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
  }
  :root {
    print-color-adjust: exact;
  }
  .body {
    margin: 0;
    flex-grow: 1;
  }
  .square {
    float: right;
    width: 100px;
    height: 100px;
    background: green;
  }
  .text {
    margin-right: 110px;
  }
</style>
<section class="page">
  <section class="body">
    <div>
    <div class="square"></div>
      <div class="text">
        There should be three pages. All pages should have a green square in the top
        right corner.
      </div>
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="break-before:page;">
      <div class="square"></div>
      <div class="text">Second page</div>
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="break-before:page;">
      <div class="square"></div>
      <div class="text">Third page</div>
    </div>
  </section>
</section>
