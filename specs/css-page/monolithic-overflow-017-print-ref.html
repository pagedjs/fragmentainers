<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 816px;
    height: 1056px;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
  }
  :root {
    print-color-adjust: exact;
  }
  .body {
    margin: 0;
    flex-grow: 1;
  }
</style>
<section class="page">
  <section class="body">
    <div style="line-height:20px;">
      <div style="position:absolute; width:100%; bottom:0; background:hotpink;">footer</div>
      <div style="position:absolute; width:100%; bottom:-100%; background:hotpink;">footer</div>
      <div style="position:absolute; width:100%; bottom:-200%; background:hotpink;">footer</div>
      <div style="height:calc(300% - 25px); background:black;"></div>
      <div style="break-before:page;">PASS</div>
      <div style="background:hotpink;">
        footer
      </div>
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    There should be a footer on every page, and the word PASS should be seen here,
    on the fourth page, just above the final footer.<br>
  </section>
</section>
