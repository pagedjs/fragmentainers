<!DOCTYPE html>
<link rel="author" title="Morten Stenshorne" href="mailto:mstensho@chromium.org">
<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 600px;
    height: 600px;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
  }
  :root {
    print-color-adjust: exact;
  }
  .body {
    margin: 0;
    flex-grow: 1;
  }
</style>
<section class="page">
  <section class="body">
    <div style="width:100px; height:100px; background:green;"></div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div>
      There should be two pages. A green square should be on each page. Nothing
      should overlap with the square.
    </div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="break-before:page; width:100px; height:100px; background:green;"></div>
  </section>
</section>
<section class="page">
  <section class="body">
    <div style="height:100px; border:solid;">
      This text should go on the second page, right below the green square. It
      should NOT be placed on top of the square.
    </div>
  </section>
</section>
