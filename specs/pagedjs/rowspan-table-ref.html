<!doctype html>
<html lang="en">
	<style>
		body {
			padding: 0;
			margin: 0;
			display: flex;
			flex-direction: column;
		}
		page-container {
			all: initial;
			display: flex;
			contain: strict;
			width: 600px;
			height: 300px;
			padding: 0px;
			box-sizing: border-box;
			overflow: hidden;
			flex-shrink: 0;
		}
		/* Test styles */
		table {
			border-collapse: collapse;
		}

		table,
		th,
		td {
			border: 1px solid black;
		}

		tr,
		td {
			break-inside: avoid;
		}
	</style>
	<script type="module" src="/debug/page-container.js"></script>
	<page-container>
		<table>
			<tbody>
				<tr>
					<td rowspan="4">1.1</td>
					<td rowspan="4">This is a long description</td>
					<td>First row, third column</td>
					<td rowspan="4">1.4</td>
					<td>First row, fifth column</td>
					<td rowspan="4">1.6</td>
				</tr>
				<tr>
					<td>Second row, third column</td>
					<td>Second row, fifth column</td>
				</tr>
				<tr>
					<td>Third row, third column</td>
					<td>Third row, fifth column</td>
				</tr>
				<tr>
					<td>Fourth row, third column</td>
					<td>Fourth row, fifth column</td>
				</tr>
			</tbody>
		</table>
	</page-container>
</html>
