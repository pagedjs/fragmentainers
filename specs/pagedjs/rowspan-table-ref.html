<!doctype html>
<style>
  body {
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: row;
  }
  .page {
    width: 600px;
    height: 300px;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
    border: 1px solid #cfc2c2;
  }
  table {
    border-collapse: collapse;
  }
  table,
  th,
  td {
    border: 1px solid black;
  }
  tr,
  td {
    break-inside: avoid;
  }
  .body {
    flex-grow: 1;
  }
</style>
<section class="page">
  <section class="body">
    <table>
      <tbody>
        <tr>
          <td rowspan="4">1.1</td>
          <td rowspan="4">This is a long description</td>
          <td>First row, third column</td>
          <td rowspan="4">1.4</td>
          <td>First row, fifth column</td>
          <td rowspan="4">1.6</td>
        </tr>
        <tr>
          <td>Second row, third column</td>
          <td>Second row, fifth column</td>
        </tr>
        <tr>
          <td>Third row, third column</td>
          <td>Third row, fifth column</td>
        </tr>
        <tr>
          <td>Fourth row, third column</td>
          <td>Fourth row, fifth column</td>
        </tr>
      </tbody>
    </table>
  </section>
</section>
