<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fragmentainer Debug</title>
  <style>
    body { font-family: monospace; font-size: 12px; margin: 1rem; background: #fff; color: #000; }
    #measure { position: absolute; left: -99999px; top: 0; visibility: hidden; }
    #output { white-space: pre-wrap; }

    /* Rendered page rows (only when render=1) */
    .page-row { display: flex; gap: 16px; margin: 8px 0; align-items: flex-start; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
    .page-row-render { flex-shrink: 0; border: 1px solid #999; overflow: hidden; background: #fff; }
    .page-row-data { white-space: pre-wrap; flex: 1; min-width: 0; overflow: auto; }
  </style>
</head>
<body>
<div id="measure"></div>
<div id="output"></div>
<script type="module">
  import { fetchAndParse, injectContent, runFragmentation } from './viewer.js';
  import { findChildBreakToken } from '../src/helpers.js';

  // Read config from URL params (same param names as viewer.html)
  const params = new URLSearchParams(location.search);
  const url = params.get('example') || 'moby-dick/index.html';
  const pageW = parseInt(params.get('w') || '816');
  const pageH = parseInt(params.get('h') || '1056');
  const maxPages = parseInt(params.get('pages') || '0'); // 0 = all
  const doRender = params.get('render') === '1';
  const renderScale = parseFloat(params.get('scale') || '0.5');

  // Ensure all params are persisted in the URL
  const canonical = new URLSearchParams();
  canonical.set('example', url);
  canonical.set('w', String(pageW));
  canonical.set('h', String(pageH));
  if (maxPages > 0) canonical.set('pages', String(maxPages));
  if (doRender) canonical.set('render', '1');
  if (params.has('scale')) canonical.set('scale', String(renderScale));
  history.replaceState(null, '', `?${canonical}`);

  const measureEl = document.getElementById('measure');
  const outputEl = document.getElementById('output');

  run();

  async function run() {
    try {
      const parsed = await fetchAndParse(url);
      measureEl.style.width = `${pageW}px`;
      injectContent(parsed, measureEl);
      await document.fonts.ready;
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      const pageSize = { inlineSize: pageW, blockSize: pageH };
      const t0 = performance.now();
      const pages = runFragmentation(measureEl, [pageSize]);
      const elapsed = (performance.now() - t0).toFixed(1);

      const header = [];
      header.push(`# Fragmentainer Debug Report`);
      header.push(`example: ${url}`);
      header.push(`pageSize: ${pageW}x${pageH}`);
      header.push(`totalPages: ${pages.length}`);
      header.push(`layoutTime: ${elapsed}ms`);
      header.push(`render: ${doRender}`);
      header.push('');

      if (!doRender) {
        // Text-only mode: output everything into #output
        const lines = [...header];
        const limit = maxPages > 0 ? Math.min(maxPages, pages.length) : pages.length;
        let issueCount = 0;

        for (let i = 0; i < limit; i++) {
          const { text, hasIssues } = buildPageDump(pages, i, pageH);
          if (hasIssues) issueCount++;
          lines.push(text);
        }

        lines.push(`---`);
        lines.push(`Pages with issues: ${issueCount}/${limit}`);
        outputEl.textContent = lines.join('\n');

      } else {
        // Render mode: header as text, then per-page rows with rendered page + data
        outputEl.textContent = header.join('\n');

        const limit = maxPages > 0 ? Math.min(maxPages, pages.length) : pages.length;
        let issueCount = 0;

        for (let i = 0; i < limit; i++) {
          const { text, hasIssues } = buildPageDump(pages, i, pageH);
          if (hasIssues) issueCount++;

          const row = document.createElement('div');
          row.className = 'page-row';

          // Rendered page
          const renderBox = document.createElement('div');
          renderBox.className = 'page-row-render';
          renderBox.style.width = `${pageW * renderScale}px`;
          renderBox.style.height = `${pageH * renderScale}px`;

          const pageEl = document.createElement('div');
          pageEl.style.width = `${pageW}px`;
          pageEl.style.height = `${pageH}px`;
          pageEl.style.overflow = 'hidden';
          pageEl.style.background = '#fff';
          pageEl.style.transform = `scale(${renderScale})`;
          pageEl.style.transformOrigin = 'top left';

          const prevBT = i > 0 ? pages[i - 1].breakToken : null;
          renderFragmentTree(pages[i], prevBT, pageEl);

          renderBox.appendChild(pageEl);
          row.appendChild(renderBox);

          // Data dump
          const dataBox = document.createElement('div');
          dataBox.className = 'page-row-data';
          dataBox.textContent = text;
          row.appendChild(dataBox);

          outputEl.appendChild(row);
          await new Promise(r => requestAnimationFrame(r));
        }

        const summary = document.createElement('div');
        summary.style.cssText = 'white-space:pre-wrap;margin-top:8px;';
        summary.textContent = `---\nPages with issues: ${issueCount}/${limit}`;
        outputEl.appendChild(summary);
      }

    } catch (err) {
      outputEl.textContent = `ERROR: ${err.message}\n${err.stack}`;
    }
  }

  // --- Page dump (returns { text, hasIssues }) ---

  function buildPageDump(pages, i, pageH) {
    const lines = [];
    const log = (...args) => lines.push(args.join(' '));

    const page = pages[i];
    const prevBT = i > 0 ? pages[i - 1].breakToken : null;
    const pageIssues = [];

    if (page.blockSize > pageH + 0.01) {
      pageIssues.push(`OVERFLOW by ${(page.blockSize - pageH).toFixed(2)}px`);
    }

    const childData = [];
    let childSum = 0;

    for (const frag of page.childFragments) {
      if (!frag.node) continue;
      childSum += frag.blockSize;
      const info = dumpFragment(frag, prevBT, 0);
      childData.push(info);
      if (info.issues) pageIssues.push(...info.issues);
    }

    const gap = page.blockSize - childSum;

    const lastFrag = page.childFragments[page.childFragments.length - 1];
    if (lastFrag?.node) {
      const clipCheck = checkLastLineClip(lastFrag, page.blockSize, pageH, prevBT);
      if (clipCheck) pageIssues.push(clipCheck);
    }

    const remaining = pageH - page.blockSize;
    const hasIssues = pageIssues.length > 0;
    const btInfo = page.breakToken
      ? `breakToken(consumed=${page.breakToken.consumedBlockSize.toFixed(1)} children=${page.breakToken.childBreakTokens.length})`
      : 'breakToken=null';
    const issueTag = hasIssues ? ` *** ${pageIssues.length} ISSUE(S)` : '';

    log(`## Page ${i + 1}/${pages.length}  blockSize=${page.blockSize.toFixed(2)}  remaining=${remaining.toFixed(2)}  ${btInfo}${issueTag}`);

    // Show first and last text node on this page
    const textSegments = collectPageTextSegments(page, prevBT);
    if (textSegments.length > 0) {
      log(`  first text: "${textSegments[0]}"`);
      if (textSegments.length > 1) {
        log(`  last text:  "${textSegments[textSegments.length - 1]}"`);
      }
    }

    log(`  childFragments: ${page.childFragments.filter(f => f.node).length}  childSum=${childSum.toFixed(2)}  gap=${gap.toFixed(2)}  remaining=${remaining.toFixed(2)}`);

    for (const info of childData) {
      printFragmentInfo(info, log, '  ');
    }

    if (hasIssues) {
      log('  ISSUES:');
      for (const issue of pageIssues) {
        log(`    - ${issue}`);
      }
    }
    log('');

    return { text: lines.join('\n'), hasIssues };
  }

  // --- Fragment data collection ---

  function dumpFragment(frag, parentBT, depth) {
    const node = frag.node;
    const tag = node.element?.tagName?.toLowerCase() || '?';
    const name = node.debugName || tag;
    const isIFC = node.isInlineFormattingContext;
    const measured = node.element ? node.element.getBoundingClientRect().height : null;
    const issues = [];

    const info = {
      name, tag, depth,
      blockSize: frag.blockSize,
      measured,
      margin: [node.marginBlockStart || 0, node.marginBlockEnd || 0],
      padding: [node.paddingBlockStart || 0, node.paddingBlockEnd || 0],
      border: [node.borderBlockStart || 0, node.borderBlockEnd || 0],
      isIFC,
      hasBreakToken: !!frag.breakToken,
      breakTokenType: frag.breakToken?.type || null,
      issues,
      children: [],
    };

    if (isIFC) {
      const data = node.inlineItemsData;
      const lh = node.lineHeight;
      const lineCount = frag.childFragments.length;
      const computed = lineCount * lh;
      const inputBT = findChildBreakToken(parentBT, node);
      const outputBT = frag.breakToken;

      info.ifc = {
        lineHeight: lh,
        lineCount,
        computedHeight: computed,
        textLength: data?.textContent?.length || 0,
        itemCount: data?.items?.length || 0,
        startOffset: inputBT?.textOffset ?? 0,
        endOffset: outputBT?.textOffset ?? (data?.textContent?.length || 0),
      };

      if (computed > frag.blockSize + 0.5) {
        issues.push(`${name}: lines*lineHeight (${computed.toFixed(2)}) > blockSize (${frag.blockSize.toFixed(2)}) by ${(computed - frag.blockSize).toFixed(2)}px`);
      }

      const remainder = frag.blockSize % lh;
      if (remainder > 0.01 && remainder < lh - 0.01) {
        issues.push(`${name}: blockSize ${frag.blockSize.toFixed(2)} is not a multiple of lineHeight ${lh.toFixed(2)} (remainder=${remainder.toFixed(2)})`);
      }
    }

    if (!isIFC) {
      for (const child of frag.childFragments) {
        if (!child.node) continue;
        const childBT = findChildBreakToken(parentBT, child.node);
        const childInfo = dumpFragment(child, parentBT, depth + 1);
        info.children.push(childInfo);
        issues.push(...childInfo.issues);
      }
    }

    return info;
  }

  function printFragmentInfo(info, log, prefix) {
    const indent = prefix + '  '.repeat(info.depth);
    const mStr = `margin=${info.margin[0].toFixed(1)}/${info.margin[1].toFixed(1)}`;
    const pStr = `pad=${info.padding[0].toFixed(1)}/${info.padding[1].toFixed(1)}`;
    const bStr = info.border[0] || info.border[1] ? ` border=${info.border[0].toFixed(1)}/${info.border[1].toFixed(1)}` : '';
    const btStr = info.hasBreakToken ? ` BT(${info.breakTokenType})` : '';
    const measuredStr = info.measured !== null ? ` measured=${info.measured.toFixed(2)}` : '';

    let line = `${indent}${info.name}  blockSize=${info.blockSize.toFixed(2)}${measuredStr}  ${mStr} ${pStr}${bStr}${btStr}`;

    if (info.isIFC && info.ifc) {
      const ifc = info.ifc;
      line += `\n${indent}  IFC: lineHeight=${ifc.lineHeight.toFixed(2)} lines=${ifc.lineCount} computed=${ifc.computedHeight.toFixed(2)} text=[${ifc.startOffset}..${ifc.endOffset}]/${ifc.textLength}`;
    }

    log(line);

    for (const child of info.children) {
      printFragmentInfo(child, log, prefix);
    }
  }

  function checkLastLineClip(frag, pageBlockSize, pageH, prevBT) {
    let current = frag;
    let bt = prevBT;
    while (current) {
      if (current.node?.isInlineFormattingContext) {
        if (pageBlockSize > pageH + 0.01) {
          return `Last IFC (${current.node.debugName}): page blockSize ${pageBlockSize.toFixed(2)} > fragmentainer ${pageH} — last line clipped`;
        }
        return null;
      }
      const blockChildren = current.childFragments.filter(f => f.node);
      if (blockChildren.length === 0) return null;
      const last = blockChildren[blockChildren.length - 1];
      bt = findChildBreakToken(bt, last.node);
      current = last;
    }
    return null;
  }

  // --- Page text extraction ---

  function collectPageTextSegments(pageFragment, inputBreakToken) {
    const segments = [];
    collectTextSegments(pageFragment, inputBreakToken, segments);
    return segments;
  }

  function collectTextSegments(fragment, inputBreakToken, segments) {
    for (const child of fragment.childFragments) {
      if (!child.node) continue;
      const childBT = findChildBreakToken(inputBreakToken, child.node);

      if (child.node.isInlineFormattingContext) {
        const data = child.node.inlineItemsData;
        if (!data || !data.textContent) continue;
        const startOffset = (childBT && childBT.type === 'inline') ? childBT.textOffset : 0;
        const endOffset = (child.breakToken && child.breakToken.type === 'inline') ? child.breakToken.textOffset : data.textContent.length;
        const text = data.textContent.slice(startOffset, endOffset).trim();
        if (text) segments.push(text);
      } else {
        collectTextSegments(child, childBT, segments);
      }
    }
  }

  // --- Fragment tree rendering (same as viewer.js) ---

  function renderFragmentTree(pageFragment, inputBreakToken, pageEl) {
    for (const child of pageFragment.childFragments) {
      if (!child.node) continue;
      const childInputBT = findChildBreakToken(inputBreakToken, child.node);
      renderFrag(child, childInputBT, pageEl);
    }
  }

  function renderFrag(fragment, inputBreakToken, parentEl) {
    if (!fragment.node) return;
    const node = fragment.node;

    if (node.isInlineFormattingContext) {
      renderInlineFrag(fragment, inputBreakToken, parentEl);
    } else if (fragment.childFragments.length > 0 && fragment.childFragments.some(f => f.node)) {
      const el = node.element.cloneNode(false);
      for (const child of fragment.childFragments) {
        if (!child.node) continue;
        const childBT = findChildBreakToken(inputBreakToken, child.node);
        renderFrag(child, childBT, el);
      }
      parentEl.appendChild(el);
    } else {
      parentEl.appendChild(node.element.cloneNode(true));
    }
  }

  function renderInlineFrag(fragment, inputBreakToken, parentEl) {
    const node = fragment.node;
    const data = node.inlineItemsData;
    if (!data || !data.items || data.items.length === 0) {
      parentEl.appendChild(node.element.cloneNode(false));
      return;
    }
    const startOffset = (inputBreakToken && inputBreakToken.type === 'inline') ? inputBreakToken.textOffset : 0;
    const endOffset = (fragment.breakToken && fragment.breakToken.type === 'inline') ? fragment.breakToken.textOffset : data.textContent.length;

    const el = node.element.cloneNode(false);
    let current = el;
    const stack = [];
    for (const item of data.items) {
      if (item.type === 'kText') {
        if (item.endOffset <= startOffset) continue;
        if (item.startOffset >= endOffset) break;
        const vs = Math.max(item.startOffset, startOffset);
        const ve = Math.min(item.endOffset, endOffset);
        const text = data.textContent.slice(vs, ve);
        if (text.length > 0) current.appendChild(document.createTextNode(text));
      } else if (item.type === 'kOpenTag') {
        const tag = item.element.cloneNode(false);
        current.appendChild(tag);
        stack.push(current);
        current = tag;
      } else if (item.type === 'kCloseTag') {
        current = stack.pop() || el;
      } else if (item.type === 'kControl') {
        if (item.startOffset >= startOffset && item.startOffset < endOffset)
          current.appendChild(document.createElement('br'));
      } else if (item.type === 'kAtomicInline') {
        if (item.startOffset >= startOffset && item.startOffset < endOffset)
          current.appendChild(item.element.cloneNode(true));
      }
    }
    parentEl.appendChild(el);
  }
</script>
</body>
</html>
