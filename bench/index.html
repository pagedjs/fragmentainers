<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragmentainer Benchmarks</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f5f5f5; }
    .controls { margin: 1rem 0; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 0.9rem; }
    .controls input { width: 80px; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .view-pages-btn { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    #status { margin: 1rem 0; font-style: italic; color: #666; }
    #preview { margin: 2rem 0; border-top: 1px solid #ddd; padding-top: 1rem; }

    /* Benchmark fixtures are rendered off-screen for DOM measurement */
    #fixtures { position: absolute; left: -9999px; top: 0; width: 600px; }
  </style>
</head>
<body>
  <h1>@pagedjs/fragmentainer — Benchmarks</h1>

  <div class="controls">
    <label>Page width: <input type="number" id="pageWidth" value="600"> px</label>
    <label>Page height: <input type="number" id="pageHeight" value="800"> px</label>
    <label>Iterations: <input type="number" id="iterations" value="5"></label>
    <button id="runBtn">Run Benchmarks</button>
  </div>

  <div id="status">Ready. Click "Run Benchmarks" to start.</div>
  <table id="results"></table>

  <div id="preview"></div>

  <!-- Benchmark fixtures rendered off-screen -->
  <div id="fixtures">
    <!-- Long prose -->
    <div data-bench data-name="long-prose" id="long-prose"></div>

    <!-- Nested blocks -->
    <div data-bench data-name="nested-blocks" id="nested-blocks"></div>

    <!-- Mixed content -->
    <div data-bench data-name="mixed-content" id="mixed-content"></div>

    <!-- Forced breaks -->
    <div data-bench data-name="forced-breaks" id="forced-breaks"></div>
  </div>

  <script type="module">
    import { runAllBenchmarks, renderResults } from './runner.js';

    // Generate fixture content
    function generateFixtures() {
      // Long prose: 200 paragraphs
      const prose = document.getElementById('long-prose');
      for (let i = 0; i < 200; i++) {
        const p = document.createElement('p');
        p.textContent = `Paragraph ${i + 1}. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.`;
        prose.appendChild(p);
      }

      // Nested blocks: 5 levels deep, 20 children each level
      const nested = document.getElementById('nested-blocks');
      function buildNested(parent, depth) {
        for (let i = 0; i < 20; i++) {
          const div = document.createElement('div');
          div.style.padding = '2px';
          div.textContent = depth === 0 ? `Leaf ${i}` : '';
          parent.appendChild(div);
          if (depth > 0) buildNested(div, depth - 1);
        }
      }
      buildNested(nested, 3);

      // Mixed content: paragraphs, images, headings
      const mixed = document.getElementById('mixed-content');
      for (let i = 0; i < 100; i++) {
        if (i % 10 === 0) {
          const h2 = document.createElement('h2');
          h2.textContent = `Section ${Math.floor(i / 10) + 1}`;
          mixed.appendChild(h2);
        }
        const p = document.createElement('p');
        p.textContent = `Content paragraph ${i + 1}. This is sample text for benchmarking the fragmentainer layout engine.`;
        mixed.appendChild(p);
        if (i % 5 === 0) {
          const img = document.createElement('div');
          img.style.height = '100px';
          img.style.background = '#eee';
          mixed.appendChild(img);
        }
      }

      // Forced breaks: elements with break-before: page
      const forced = document.getElementById('forced-breaks');
      for (let i = 0; i < 50; i++) {
        const div = document.createElement('div');
        if (i > 0) div.style.breakBefore = 'page';
        div.textContent = `Page ${i + 1} content. This section should start on a new page.`;
        forced.appendChild(div);
      }
    }

    generateFixtures();

    document.getElementById('runBtn').addEventListener('click', () => {
      const pageWidth = parseInt(document.getElementById('pageWidth').value);
      const pageHeight = parseInt(document.getElementById('pageHeight').value);
      const iterations = parseInt(document.getElementById('iterations').value);
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      status.textContent = 'Running benchmarks...';
      preview.innerHTML = '';

      // Use requestAnimationFrame to let the status update render
      requestAnimationFrame(() => {
        const fixtures = document.getElementById('fixtures');
        const pageSize = { inlineSize: pageWidth, blockSize: pageHeight };

        const results = runAllBenchmarks(fixtures, pageSize, iterations);
        renderResults(results, document.getElementById('results'), preview);

        status.textContent = `Done. ${results.length} fixtures benchmarked. Click "View Pages" to see fragmentainer output.`;
      });
    });
  </script>
</body>
</html>
