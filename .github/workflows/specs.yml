name: Specs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run specs

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: spec-report
          path: spec-report/
          retention-days: 14
