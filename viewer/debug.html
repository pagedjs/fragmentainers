<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fragmentainer Debug</title>
    <style>
      body {
        font-family: monospace;
        font-size: 12px;
        margin: 1rem;
        background: #fff;
        color: #000;
      }
      #header {
        white-space: pre-wrap;
        background: #f8f8f8;
        border: 1px solid #ccc;
        padding: 8px;
        margin-bottom: 16px;
        display: none;
        width: calc(100vw - 60px);
      }
      #header-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
        border-top: 1px solid #ccc;
        padding-top: 8px;
      }
      #header-controls button {
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
      }
      #header-controls label {
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }
      #output {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Rendered page rows */
      .page-row {
        --page-scale: min(1, tan(atan2(100vw, var(--page-inline-size) * 1px)));
        border-bottom: 1px solid #ccc;
        padding-bottom: 8px;
      }
      .page-row-title {
        font-weight: bold;
        margin-bottom: 4px;
        padding: 4px 0;
      }
      .page-row-content {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      .page-row-render {
        width: calc(var(--page-inline-size) * var(--page-scale) * 1px);
        height: calc(var(--page-block-size) * var(--page-scale) * 1px);
        flex-shrink: 0;
        border: 1px solid #999;
        overflow: hidden;
        background: #fff;
      }
      .page-row-data {
        white-space: pre-wrap;
        flex: 1;
        min-width: 0;
        overflow: auto;
      }
      .page-row.has-issues .page-row-render {
        border: 2px solid red;
      }
      .page-row.scroll-data .page-row-data {
        max-height: calc(var(--page-block-size) * var(--page-scale) * 1px);
        overflow-y: auto;
      }

      @media (max-width: 900px) {
        .page-row-content {
          flex-direction: column;
        }
        .page-row.scroll-data .page-row-data {
          max-height: none !important;
          overflow-y: visible;
        }
      }
    </style>
  </head>
  <body>
    <div id="header"></div>
    <div id="output"></div>
    <script type="module">
      import { ContentParser, FragmentainerLayout } from "./viewer.js";
      import "../src/dom/fragment-container.js";
      import { PageSizeResolver } from "../src/atpage/page-rules.js";
      import {
        buildPageDump,
        buildDocumentSummary,
        fragmentainerHeight,
      } from "./debug.js";

      const params = new URLSearchParams(location.search);
      const url = params.get("url") || "examples/aurorae/index.html";
      const pageW = parseInt(params.get("w") || "816");
      const pageH = parseInt(params.get("h") || "1056");
      const maxPages = parseInt(params.get("pages") || "0");
      const singlePage = parseInt(params.get("page") || "0"); // 1-based; 0 = show all
      const doRender = params.get("render") !== "0";

      // Persist canonical params in the URL
      const canonical = new URLSearchParams();
      canonical.set("url", url);
      canonical.set("w", String(pageW));
      canonical.set("h", String(pageH));
      if (maxPages > 0) canonical.set("pages", String(maxPages));
      if (singlePage > 0) canonical.set("page", String(singlePage));
      if (!doRender) canonical.set("render", "0");
      history.replaceState(null, "", `?${canonical}`);

      const headerEl = document.getElementById("header");
      const outputEl = document.getElementById("output");

      let fullDebugText = "";
      let scrollDataEnabled = true;

      run();

      async function run() {
        try {
          const response = await fetch(url);
          const content = await response.text();
          const baseURL = url.substring(0, url.lastIndexOf("/") + 1);
          const parsed = await ContentParser.fromString(content, baseURL);

          const size = { inlineSize: pageW, blockSize: pageH };
          const resolver = PageSizeResolver.fromStyleSheets(
            parsed.styles,
            size,
          );

          const layout = new FragmentainerLayout(parsed.fragment, {
            styles: parsed.styles,
            resolver: resolver.pageRules.length > 0 ? resolver : undefined,
            width: resolver.pageRules.length === 0 ? pageW : undefined,
            height: resolver.pageRules.length === 0 ? pageH : undefined,
          });
          const t0 = performance.now();
          const flow = await layout.flow();
          const fragments = flow.fragments;
          const elapsed = (performance.now() - t0).toFixed(1);

          const header = buildHeader(fragments, resolver, elapsed);
          let startIdx = 0;
          let endIdx = fragments.length;
          if (singlePage > 0 && singlePage <= fragments.length) {
            startIdx = singlePage - 1;
            endIdx = singlePage;
          } else if (maxPages > 0) {
            endIdx = Math.min(maxPages, fragments.length);
          }

          if (!doRender) {
            renderTextMode(fragments, header, startIdx, endIdx);
          } else {
            await renderVisualMode(fragments, flow, header, startIdx, endIdx, t0);
          }
        } catch (err) {
          outputEl.textContent = `ERROR: ${err.message}\n${err.stack}`;
        }
      }

      function buildHeader(fragments, resolver, elapsed) {
        const lines = [];
        lines.push("# Fragmentainer Debug Report");
        lines.push(`url: ${url}`);
        if (resolver) {
          const first = resolver.resolve(0, null, null);
          lines.push(
            `pageSize: ${first.pageBoxSize.inlineSize}x${first.pageBoxSize.blockSize} (from @page rules)`,
          );
        } else {
          lines.push(`pageSize: ${pageW}x${pageH}`);
        }
        lines.push(`totalPages: ${fragments.length}`);
        lines.push(`layoutTime: ${elapsed}ms`);
        lines.push(`render: ${doRender}`);
        lines.push("");
        lines.push(buildDocumentSummary(fragments, pageH));
        lines.push("");
        return lines;
      }

      function buildHeaderControls() {
        const controls = document.createElement("div");
        controls.id = "header-controls";

        const urlInput = document.createElement("input");
        urlInput.type = "text";
        urlInput.value = url;
        urlInput.style.cssText =
          "font-family:monospace;font-size:12px;flex:1;min-width:200px;padding:2px 4px;";
        urlInput.placeholder = "examples/aurorae/index.html";
        controls.appendChild(urlInput);

        const renderBtn = document.createElement("button");
        renderBtn.textContent = "Render";
        renderBtn.addEventListener("click", () => {
          const p = new URLSearchParams(location.search);
          p.set("url", urlInput.value);
          location.search = p.toString();
        });
        urlInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") renderBtn.click();
        });
        controls.appendChild(renderBtn);

        const downloadBtn = document.createElement("button");
        downloadBtn.textContent = "Download";
        downloadBtn.addEventListener("click", () => {
          const blob = new Blob([fullDebugText], { type: "text/plain" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "debug-report.txt";
          a.click();
          URL.revokeObjectURL(a.href);
        });
        controls.appendChild(downloadBtn);

        if (doRender) {
          const label = document.createElement("label");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = scrollDataEnabled;
          checkbox.addEventListener("change", () => {
            scrollDataEnabled = checkbox.checked;
            for (const row of outputEl.querySelectorAll(".page-row")) {
              row.classList.toggle("scroll-data", scrollDataEnabled);
            }
          });
          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(" Scroll debug info"));
          controls.appendChild(label);
        }

        return controls;
      }

      function renderTextMode(fragments, header, startIdx, endIdx) {
        const lines = [...header];
        let issueCount = 0;
        for (let i = startIdx; i < endIdx; i++) {
          const effH = fragmentainerHeight(fragments[i], pageH);
          const { text, hasIssues } = buildPageDump(fragments, i, effH);
          if (hasIssues) issueCount++;
          lines.push(text);
        }
        const shown = endIdx - startIdx;
        lines.push("---");
        lines.push(`Pages with issues: ${issueCount}/${shown}`);

        fullDebugText = lines.join("\n");
        headerEl.style.display = "block";
        headerEl.textContent = header.join("\n");
        headerEl.appendChild(buildHeaderControls());
        outputEl.style.whiteSpace = "pre-wrap";
        outputEl.textContent = lines.slice(header.length).join("\n");
      }

      async function renderVisualMode(fragments, flow, header, startIdx, endIdx, t0) {
        const debugLines = [...header];
        let issueCount = 0;

        for (let i = startIdx; i < endIdx; i++) {
          const c = fragments[i].constraints;
          const fragW = c?.pageBoxSize ? c.pageBoxSize.inlineSize : pageW;
          const fragH = c?.pageBoxSize ? c.pageBoxSize.blockSize : pageH;
          const effH = fragmentainerHeight(fragments[i], pageH);
          const dump = buildPageDump(fragments, i, effH);

          debugLines.push(dump.text);

          const row = document.createElement("div");
          row.className = "page-row";
          row.style.setProperty("--page-inline-size", fragW);
          row.style.setProperty("--page-block-size", fragH);
          if (scrollDataEnabled) row.classList.add("scroll-data");

          // Page title
          const titleEl = document.createElement("div");
          titleEl.className = "page-row-title";
          titleEl.textContent = `Page ${i + 1}/${fragments.length}`;
          row.appendChild(titleEl);

          // Content: render + data side by side
          const contentEl = document.createElement("div");
          contentEl.className = "page-row-content";

          const renderBox = document.createElement("div");
          renderBox.className = "page-row-render";

          const fragEl = flow.renderFragmentainer(i);
          // fragEl.style.width = `${fragW}px`;
          // fragEl.style.height = `${fragH}px`;
          if (c && c.margins) {
            renderBox.style.boxSizing = "border-box";
            renderBox.style.paddingTop = `${c.margins.top}px`;
            renderBox.style.paddingRight = `${c.margins.right}px`;
            renderBox.style.paddingBottom = `${c.margins.bottom}px`;
            renderBox.style.paddingLeft = `${c.margins.left}px`;
          }
          // fragEl.style.transform = "scale(var(--page-scale))";
          fragEl.style.transformOrigin = "top left";

          renderBox.appendChild(fragEl);
          contentEl.appendChild(renderBox);

          const dataBox = document.createElement("div");
          dataBox.className = "page-row-data";
          dataBox.textContent = dump.text;
          contentEl.appendChild(dataBox);

          row.appendChild(contentEl);
          outputEl.appendChild(row);

          if (dump.hasIssues) {
            issueCount++;
            row.classList.add("has-issues");
          }

          // Listen for render overflow
          fragEl.addEventListener("overflow", (e) => {
            const d = e.detail;
            dataBox.textContent += `\n  ISSUES:\n    - RENDER OVERFLOW: rendered ${d.renderedBlockSize.toFixed(1)}px vs expected ${d.expectedBlockSize.toFixed(1)}px (delta ${d.overflow.toFixed(1)}px)`;
            row.classList.add("has-issues");
          });
          fragEl.startObserving();
        }

        const shown = endIdx - startIdx;
        debugLines.push("---");
        debugLines.push(`Pages with issues: ${issueCount}/${shown}`);
        debugLines.push(`renderTime: ${(performance.now() - t0).toFixed(1)}ms`);
        fullDebugText = debugLines.join("\n");

        headerEl.style.display = "block";
        headerEl.textContent = header.join("\n");
        headerEl.textContent += `pageIssues: ${issueCount}/${shown}\n`;
        headerEl.textContent += `renderTime: ${(performance.now() - t0).toFixed(1)}ms`;
        headerEl.appendChild(buildHeaderControls());
      }
    </script>
  </body>
</html>
