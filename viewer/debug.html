<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fragmentainer Debug</title>
    <style>
      body {
        font-family: monospace;
        font-size: 12px;
        margin: 1rem;
        background: #fff;
        color: #000;
      }
      #measure {
        position: absolute;
        left: -99999px;
        top: 0;
      }
      #layout-root {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      #output {
        flex: 1;
        min-width: 0;
        white-space: pre-wrap;
      }
      #report {
        position: sticky;
        top: 1rem;
        width: 320px;
        flex-shrink: 0;
        white-space: pre-wrap;
        background: #f8f8f8;
        border: 1px solid #ccc;
        padding: 8px;
        display: none;
      }

      /* Rendered page rows (only when render=1) */
      .page-row {
        display: flex;
        gap: 16px;
        margin: 8px 0;
        align-items: flex-start;
        border-bottom: 1px solid #ccc;
        padding-bottom: 8px;
      }
      .page-row-render {
        flex-shrink: 0;
        border: 1px solid #999;
        overflow: hidden;
        background: #fff;
      }
      .page-row-data {
        white-space: pre-wrap;
        flex: 1;
        min-width: 0;
        overflow: auto;
      }
      .page-row.has-issues .page-row-render {
        border: 2px solid red;
      }
    </style>
  </head>
  <body>
    <content-measure id="measure"></content-measure>
    <div id="layout-root">
      <div id="output"></div>
      <div id="report"></div>
    </div>
    <script type="module">
      import {
        fetchAndParse,
        injectContent,
        waitForFonts,
        FragmentainerLayout,
      } from "./viewer.js";
      import "../src/dom/frag-measure.js";
      import {
        parsePageRulesFromCSS,
        PageSizeResolver,
      } from "../src/page-rules.js";
      import {
        buildPageDump,
        buildDocumentSummary,
        fragmentainerHeight,
      } from "./debug.js";

      const params = new URLSearchParams(location.search);
      const url = params.get("url") || "examples/moby-dick/index.html";
      const pageW = parseInt(params.get("w") || "816");
      const pageH = parseInt(params.get("h") || "1056");
      const maxPages = parseInt(params.get("pages") || "0");
      const doRender = params.get("render") !== "0";
      const renderScale = parseFloat(params.get("scale") || "0.8");

      // Persist canonical params in the URL
      const canonical = new URLSearchParams();
      canonical.set("url", url);
      canonical.set("w", String(pageW));
      canonical.set("h", String(pageH));
      if (maxPages > 0) canonical.set("pages", String(maxPages));
      if (!doRender) canonical.set("render", "0");
      if (params.has("scale")) canonical.set("scale", String(renderScale));
      history.replaceState(null, "", `?${canonical}`);

      const measureEl = document.getElementById("measure");
      const outputEl = document.getElementById("output");
      const reportEl = document.getElementById("report");

      run();

      async function run() {
        try {
          const parsed = await fetchAndParse(url);
          const contentRoot = injectContent(parsed, measureEl);
          await waitForFonts(measureEl);

          // Parse @page rules from injected content
          const contentCSSText = measureEl.getContentStyles().cssText;
          const pageRules = parsePageRulesFromCSS([contentCSSText]);

          const size = { inlineSize: pageW, blockSize: pageH };
          let resolver;
          if (pageRules.length > 0) {
            resolver = new PageSizeResolver(pageRules, size);
            const firstConstraints = resolver.resolve(0, null, null);
            measureEl.style.width = `${firstConstraints.contentArea.inlineSize}px`;
          }

          const t0 = performance.now();
          const layout = new FragmentainerLayout(
            contentRoot,
            resolver ? { resolver } : { size },
          );
          const flow = layout.flow();
          const fragments = flow.fragments;
          const elapsed = (performance.now() - t0).toFixed(1);

          const header = buildHeader(fragments, resolver, elapsed);
          const limit =
            maxPages > 0
              ? Math.min(maxPages, fragments.length)
              : fragments.length;

          if (!doRender) {
            renderTextMode(fragments, header, limit);
          } else {
            await renderVisualMode(fragments, flow, header, limit, t0);
          }
        } catch (err) {
          outputEl.textContent = `ERROR: ${err.message}\n${err.stack}`;
        }
      }

      function buildHeader(fragments, resolver, elapsed) {
        const lines = [];
        lines.push("# Fragmentainer Debug Report");
        lines.push(`url: ${url}`);
        if (resolver) {
          const first = resolver.resolve(0, null, null);
          lines.push(
            `pageSize: ${first.pageBoxSize.inlineSize}x${first.pageBoxSize.blockSize} (from @page rules)`,
          );
        } else {
          lines.push(`pageSize: ${pageW}x${pageH}`);
        }
        lines.push(`totalPages: ${fragments.length}`);
        lines.push(`layoutTime: ${elapsed}ms`);
        lines.push(`render: ${doRender}`);
        lines.push("");
        lines.push(buildDocumentSummary(fragments, pageH));
        lines.push("");
        return lines;
      }

      function renderTextMode(fragments, header, limit) {
        const lines = [...header];
        let issueCount = 0;
        for (let i = 0; i < limit; i++) {
          const effH = fragmentainerHeight(fragments[i], pageH);
          const { text, hasIssues } = buildPageDump(fragments, i, effH);
          if (hasIssues) issueCount++;
          lines.push(text);
        }
        lines.push("---");
        lines.push(`Pages with issues: ${issueCount}/${limit}`);
        outputEl.textContent = lines.join("\n");
      }

      async function renderVisualMode(fragments, flow, header, limit, t0) {
        reportEl.style.display = "block";
        reportEl.textContent = header.join("\n");

        let issueCount = 0;
        for (let i = 0; i < limit; i++) {
          const c = fragments[i].constraints;
          const fragW = c ? c.pageBoxSize.inlineSize : pageW;
          const fragH = c ? c.pageBoxSize.blockSize : pageH;
          const effH = fragmentainerHeight(fragments[i], pageH);
          const dump = buildPageDump(fragments, i, effH);

          const row = document.createElement("div");
          row.className = "page-row";

          const renderBox = document.createElement("div");
          renderBox.className = "page-row-render";
          renderBox.style.width = `${fragW * renderScale}px`;
          renderBox.style.height = `${fragH * renderScale}px`;

          const fragEl = flow.renderFragmentainer(i);
          fragEl.style.width = `${fragW}px`;
          fragEl.style.height = `${fragH}px`;
          if (c && c.margins) {
            fragEl.style.boxSizing = "border-box";
            fragEl.style.paddingTop = `${c.margins.top}px`;
            fragEl.style.paddingRight = `${c.margins.right}px`;
            fragEl.style.paddingBottom = `${c.margins.bottom}px`;
            fragEl.style.paddingLeft = `${c.margins.left}px`;
          }
          fragEl.style.transform = `scale(${renderScale})`;
          fragEl.style.transformOrigin = "top left";

          renderBox.appendChild(fragEl);
          row.appendChild(renderBox);
          outputEl.appendChild(row);

          // Detect render overflow
          fragEl.style.overflow = "visible";
          fragEl.style.height = "auto";
          fragEl.style.transform = "none";
          const naturalH = fragEl.scrollHeight;
          fragEl.style.overflow = "hidden";
          fragEl.style.height = `${fragH}px`;
          fragEl.style.transform = `scale(${renderScale})`;

          if (naturalH > fragH + 0.5) {
            dump.text += `\n  ISSUES:\n    - RENDER OVERFLOW: rendered content ${naturalH}px > fragmentainer ${fragH}px (overflow by ${(naturalH - fragH).toFixed(1)}px)`;
            dump.hasIssues = true;
          }

          if (dump.hasIssues) {
            issueCount++;
            row.classList.add("has-issues");
          }

          const dataBox = document.createElement("div");
          dataBox.className = "page-row-data";
          dataBox.textContent = dump.text;
          row.appendChild(dataBox);
        }

        const summary = document.createElement("div");
        summary.style.cssText =
          "white-space:pre-wrap;margin-top:8px;border-top:1px solid #ccc;padding-top:8px;";
        summary.textContent = `pageIssues: ${issueCount}/${limit}\n`;
        summary.textContent += `renderTime: ${(performance.now() - t0).toFixed(1)}ms`;
        reportEl.appendChild(summary);
      }
    </script>
  </body>
</html>
